<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buenlag 2nd System</title>
    <style>
        /* Core Layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- TACTICAL ENTRANCE LAYER --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0a192f 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: exitOverlay 0.8s ease-in forwards;
            animation-delay: 4s;
        }

        /* Lightning Animation */
        .lightning {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 10000;
            pointer-events: none;
            animation: lightningFlash 4s ease-out;
        }

        /* Eagle "Dive" Animation */
        .eagle-entrance {
            width: 320px;
            height: auto;
            z-index: 10001;
            opacity: 0;
            filter: drop-shadow(0 0 20px #00aaff);
            transform: scale(2) translateY(-200px);
            animation: eagleDive 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
            animation-delay: 0.5s;
        }

        /* System Loading Text */
        .status-text {
            color: #00aaff;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 20px;
            letter-spacing: 3px;
            font-size: 14px;
            opacity: 0;
            z-index: 10001;
            animation: fadeInOut 3s infinite;
        }

        /* Keyframes */
        @keyframes lightningFlash {
            0%, 15%, 25%, 100% { opacity: 0; }
            10% { opacity: 0.8; }
            12% { opacity: 0.1; }
            20% { opacity: 1; }
            22% { opacity: 0; }
        }

        @keyframes eagleDive {
            0% { opacity: 0; transform: scale(2) translateY(-200px) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes exitOverlay {
            to { transform: scale(1.5); opacity: 0; visibility: hidden; }
        }

        /* --- STICKY NAVY LOGO --- */
        .logo-link {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 998;
            transition: all 0.3s ease;
        }
        .logo-link:hover {
            transform: scale(1.1) translateY(-5px);
            filter: drop-shadow(0 0 10px #00aaff);
        }
        .logo-link img {
            width: 70px;
            height: auto;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="lightning"></div>
        <img src="Buenlag 2nd.png" class="eagle-entrance" alt="Buenlag Logo">
        <div class="status-text">INITIALIZING SECURE LINK...</div>
    </div>

    <div id="container">
        <iframe src="https://script.google.com/macros/s/AKfycby_XbhkE-4JbB2tR80Yz6qjTQBXPzU_V-95v8dPg-KHffAdCo4WGi5c8RwoPnvjUkbu/exec"></iframe>
    </div>

    <a href="#" class="logo-link">
        <img src="Buenlag 2nd.png" alt="Buenlag 2nd Logo">
    </a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Buenlag 2nd.png">
    <title>BUENLAG II | APEX TACTICAL OS</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.5);
            --danger: #ff3c3c;
            --bg-dark: #02060a;
            --panel-bg: rgba(2, 6, 10, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: var(--cyan);
            font-family: 'Segoe UI', Roboto, monospace;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* --- ATMOSPHERIC EFFECTS --- */
        #lightning-flash {
            position: fixed; inset: 0;
            background: #fff; opacity: 0;
            z-index: 10000; pointer-events: none;
            animation: strike 4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes strike {
            0% { opacity: 0; }
            44% { opacity: 0; }
            45% { opacity: 1; background: var(--cyan); }
            47% { opacity: 0.2; }
            48% { opacity: 1; background: #fff; }
            52% { opacity: 0; }
        }

        .scanline-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 50%);
            background-size: 100% 4px;
            z-index: 9000; pointer-events: none; opacity: 0.5;
        }

        /* --- CINEMATIC INTRO --- */
        #intro-terminal {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #061626 0%, #000 100%);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: dissolve 0.8s ease-in forwards 4.6s;
        }

        .logo-impact {
            width: 320px;
            filter: drop-shadow(0 0 20px var(--cyan-glow));
            animation: slamDown 1.5s cubic-bezier(0.13, 0.9, 0.2, 1) forwards;
        }

        .shock-ring {
            position: absolute; border: 2px solid var(--cyan);
            border-radius: 50%; opacity: 0;
            animation: ripple 1.2s ease-out forwards 1.3s;
        }

        @keyframes slamDown {
            0% { transform: scale(10); opacity: 0; filter: blur(40px) brightness(10); }
            100% { transform: scale(1); opacity: 1; filter: blur(0) brightness(1); }
        }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; border-width: 10px; }
            100% { width: 1000px; height: 1000px; opacity: 0; border-width: 1px; }
        }

        .boot-loader {
            margin-top: 30px;
            font-size: 12px; font-weight: bold;
            letter-spacing: 8px;
            text-shadow: 2px 0 0 rgba(255,0,0,0.5), -2px 0 0 rgba(0,0,255,0.5); /* Glitch effect */
            overflow: hidden; white-space: nowrap;
            width: 0; border-right: 3px solid var(--cyan);
            animation: typeIn 2s steps(30) 1.8s forwards, blink 0.6s infinite;
        }

        @keyframes typeIn { from { width: 0; } to { width: 350px; } }
        @keyframes blink { 50% { border-color: transparent; } }
        @keyframes dissolve { to { clip-path: inset(0 0 100% 0); opacity: 0; visibility: hidden; } }

        /* --- MAIN INTERFACE --- */
        #main-viewport {
            position: absolute; inset: 0;
            transition: 0.8s cubic-bezier(0.2, 0, 0, 1);
        }

        body.panel-open #main-viewport {
            transform: scale(0.92) translateX(-15%);
            filter: grayscale(0.5) brightness(0.3) blur(10px);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- SLIDE-ACTION SIDE PANEL --- */
        #side-panel-wrapper {
            position: fixed; inset: 0;
            z-index: 8500; visibility: hidden;
            display: flex; justify-content: flex-end;
            transition: 0.4s;
        }

        #side-panel-wrapper.active { visibility: visible; background: rgba(0,0,0,0.6); }

        .panel-container {
            width: 75%; height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            border-left: 2px solid var(--cyan);
            transform: translateX(100%);
            transition: 0.6s cubic-bezier(0.2, 0, 0, 1);
            display: flex; flex-direction: column;
            box-shadow: -20px 0 50px rgba(0,0,0,0.9);
        }

        #side-panel-wrapper.active .panel-container { transform: translateX(0); }

        .panel-header {
            padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            background: linear-gradient(90deg, rgba(0,242,255,0.05), transparent);
        }

        /* --- TACTICAL HUD DOCK --- */
        .hud-dock {
            position: fixed; bottom: 40px; left: 40px;
            display: flex; align-items: center; gap: 30px;
            z-index: 9500;
        }

        .tactical-btn {
            background: rgba(0, 242, 255, 0.05);
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 16px 40px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 4px;
            cursor: pointer; position: relative;
            transition: 0.3s;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
        }

        .tactical-btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 30px var(--cyan-glow);
            transform: translateY(-5px);
        }

        @media (max-width: 768px) { .panel-container { width: 100%; } }
    </style>
</head>
<body id="os-root">

    <div id="lightning-flash"></div>
    <div class="scanline-overlay"></div>

    <div id="intro-terminal">
        <div class="shock-ring"></div>
        <img src="Buenlag 2nd.png" class="logo-impact" alt="Logo">
        <div class="boot-loader">BUENLAG II_SYSTEM_ACTIVE_</div>
    </div>

    <div id="main-viewport">
        <iframe src="https://script.google.com/macros/s/AKfycbwP_-ND7RoIu-PByHnuElzdQqa9LWOJVFWHHjahnuQEP9BejcffHJQXIOo8XiUd8g-2/exec" 
                sandbox="allow-scripts allow-forms allow-popups allow-same-origin"></iframe>
    </div>

    <div id="side-panel-wrapper" onclick="ui.toggleForm()">
        <div class="panel-container" onclick="event.stopPropagation()">
            <div class="panel-header">
                <div style="font-size: 14px; letter-spacing: 5px; font-weight: bold;">
                    <span style="color: #fff;">[SECURE]</span> REGISTRATION_PORTAL
                </div>
                <button style="background: var(--danger); border: none; color: #fff; padding: 10px 20px; cursor: pointer; font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);" onclick="ui.toggleForm()">ABORT [X]</button>
            </div>
            <iframe src="https://script.google.com/macros/s/AKfycby_XbhkE-4JbB2tR80Yz6qjTQBXPzU_V-95v8dPg-KHffAdCo4WGi5c8RwoPnvjUkbu/exec?page=form" 
                    sandbox="allow-scripts allow-forms allow-popups allow-same-origin"></iframe>
        </div>
    </div>

    <div class="hud-dock">
        <img src="Buenlag 2nd.png" style="width: 80px; cursor: pointer; filter: drop-shadow(0 0 10px var(--cyan-glow)); transition: 0.5s;" onclick="location.reload()" onmouseover="this.style.filter='brightness(1.5) drop-shadow(0 0 20px var(--cyan))'">
        <button class="tactical-btn" onclick="ui.toggleForm()">Registration</button>
    </div>

    <script>
        const ui = {
            toggleForm: () => {
                const wrapper = document.getElementById('side-panel-wrapper');
                const root = document.getElementById('os-root');
                wrapper.classList.toggle('active');
                root.classList.toggle('panel-open');
            }
        };

        // Garbage collection for intro assets
        setTimeout(() => {
            const flash = document.getElementById('lightning-flash');
            if(flash) flash.remove();
        }, 5000);
    </script>
</body>
</html>

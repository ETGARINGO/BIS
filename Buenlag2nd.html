<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buenlag 2nd System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* The Main System Container */
        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- PRELOADER ANIMATION --- */
        #intro-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: revealSystem 1s forwards;
            animation-delay: 3.5s;
        }

        /* Lightning Flash Effect */
        .lightning {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 10000;
            animation: lightningStrike 3s ease-out forwards;
        }

        /* Eagle Entrance Animation */
        .eagle-intro {
            width: 350px;
            height: auto;
            filter: drop-shadow(0 0 20px #0055ff);
            opacity: 0;
            transform: translate(-200px, -200px) scale(0.5) rotate(-20deg);
            animation: eagleDive 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: 0.8s;
        }

        /* --- KEYFRAMES --- */
        @keyframes lightningStrike {
            0% { opacity: 0; }
            10% { opacity: 0.8; }
            12% { opacity: 0.2; }
            14% { opacity: 0.9; }
            16% { opacity: 0; }
            50% { opacity: 0; }
            52% { opacity: 0.7; }
            54% { opacity: 0; }
        }

        @keyframes eagleDive {
            0% { opacity: 0; transform: translate(-200px, -200px) scale(0.5) rotate(-20deg); }
            70% { opacity: 1; transform: translate(30px, 30px) scale(1.1) rotate(5deg); }
            100% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); filter: drop-shadow(0 0 30px #00ccff); }
        }

        @keyframes revealSystem {
            to { transform: translateY(-100%); visibility: hidden; }
        }

        /* --- STICKY LOGO --- */
        .logo-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 998;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-link:hover {
            transform: scale(1.15) rotate(5deg);
            filter: brightness(1.2) drop-shadow(0 0 15px #0088ff);
        }
        .logo-link img {
            width: 80px;
            height: auto;
        }
    </style>
</head>
<body>

    <div id="intro-layer">
        <div class="lightning"></div>
        <img src="Buenlag 2nd.png" class="eagle-intro" alt="Intro Eagle">
    </div>

    <div id="container">
        <iframe src="https://script.google.com/macros/s/AKfycby_XbhkE-4JbB2tR80Yz6qjTQBXPzU_V-95v8dPg-KHffAdCo4WGi5c8RwoPnvjUkbu/exec"></iframe>
    </div>

    <a href="#" class="logo-link">
        <img src="Buenlag 2nd.png" alt="Buenlag 2nd Logo">
    </a>

</body>
</html>
